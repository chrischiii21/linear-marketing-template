<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Linear Marketing">
  <title>Linear Marketing</title>
  <!-- Rounded background so the dark logo mark stays visible on any tab color -->
  <rect width="64" height="64" rx="12" fill="#FFFFFF"/>
  <!-- Logo mark: stacked ascending bars + arrow (matches linear-marketing-logo.svg) -->
  <g transform="translate(14 8)">
    <!-- Bar 1 (short) -->
    <rect x="0"  y="32" width="9" height="16" rx="2" fill="#1F2937"/>
    <!-- Bar 2 (medium) -->
    <rect x="13" y="20" width="9" height="28" rx="2" fill="#1F2937"/>
    <!-- Bar 3 (tall, gold accent) -->
    <rect x="26" y="4"  width="9" height="44" rx="2" fill="#F5BF3A"/>
    <!-- Diagonal arrow tying them together -->
    <path d="M2 40 L35 7" stroke="#1F2937" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Arrowhead -->
    <path d="M35 7 L28 6 M35 7 L34 14" stroke="#1F2937" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </g>
</svg>
